<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- === Titel & Suchmaschinen === -->
    <title>Mediathek & Galerie | Schach-Rheinfelden (CH & DE)</title>
    <meta name="description" content="Fotos, Videos, Lehrpartien und Impressionen der Schach-Gemeinschaft Schach-Rheinfelden am Hochrhein." />

    <!-- === Favicon & Icons === -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">

    <!-- ================================================================
         LINK-VORSCHAU (Open Graph) fuer WhatsApp, Facebook, iMessage etc.
         >>> HIER ANPASSEN, wenn Vorschau-Titel, -Text oder -Bild sich
         >>> aendern sollen. og:image muss eine ABSOLUTE URL sein (https://...).
         ================================================================ -->
    <meta property="og:title" content="Mediathek & Galerie - Schach-Rheinfelden" />
    <meta property="og:description" content="Entdecke Bildergalerien, Videos und Höhepunkte aus dem Vereinsleben von Schach-Rheinfelden." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://schach-rheinfelden.github.io/mediathek.html" />
    <meta property="og:image" content="https://res.cloudinary.com/i1wuvnct/image/upload/w_800,c_limit,f_auto,q_auto/v1784323180/Bilder/Logos/Schach-Rheinfelden_Banner_jjcvcl.png" />
    <meta property="og:site_name" content="Schach-Rheinfelden" />

    <link rel="stylesheet" href="css/style.css?v=32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        .search-bar {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            margin-bottom: 2rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-bar:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.15);
        }
        .light-theme .search-bar {
            background: rgba(0, 0, 0, 0.05);
        }
        .light-theme .search-bar:focus {
            background: rgba(0, 0, 0, 0.08);
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
        }
        .light-theme input[type="date"]::-webkit-calendar-picker-indicator {
            filter: none;
            opacity: 0.6;
        }
        
        .media-card {
            padding: 0 !important;
            overflow: hidden !important;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .media-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
            border-color: var(--accent-color);
        }
        .media-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 0 !important;
            margin-bottom: 0 !important;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--accent-color);
        }
        .media-content {
            padding: 1.5rem !important;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .media-type-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--accent-color);
            color: #000;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="top-banner" class="top-banner"></div>
    <header id="navbar" class="navbar">
        <nav class="container nav-content">
            <div class="brand-wrapper">
                <a href="index.html" class="brand">
                    <span class="logo-icon">♞</span>
                    <span id="nav-club-name" class="brand-name">Schach Rheinfelden</span>
                </a>
                <div id="nav-today-badge" class="nav-today-badge hidden"></div>
            </div>
            <ul class="nav-links" id="nav-links">
                <!-- Menü wird dynamisch von shared.js (initDynamicMenu) generiert -->
            </ul>
            <div class="nav-controls">
                <label class="theme-switch" title="Theme wechseln">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider round"></span>
                </label>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <main style="padding-top: 120px; min-height: 100vh;">
        <section class="section">
            <div class="container">
                <h1 class="section-title" style="margin-bottom: 2rem;">Unsere <span class="accent">Mediathek</span></h1>
                
                <input type="text" id="media-search" class="search-bar" placeholder="Suchen nach Titel oder Beschreibung...">
                
                <div class="date-filter-container" style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 2rem; background: var(--glass-bg); padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <label for="media-date-from" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;">Von:</label>
                        <input type="date" id="media-date-from" class="search-bar" style="margin-bottom: 0; width: auto; padding: 0.5rem 0.8rem; border-radius: 8px; font-family: inherit; font-size: 0.85rem; font-style: italic; color: var(--text-secondary);">
                    </div>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <label for="media-date-to" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;">Bis:</label>
                        <input type="date" id="media-date-to" class="search-bar" style="margin-bottom: 0; width: auto; padding: 0.5rem 0.8rem; border-radius: 8px; font-family: inherit; font-size: 0.85rem; font-style: italic; color: var(--text-secondary);">
                    </div>
                    <button id="media-date-reset" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;">Reset</button>
                </div>
                
                <div id="media-filter" class="filter-bar" style="margin-bottom: 1rem;">
                    <!-- Filter buttons injected via JS -->
                </div>
                
                <div id="media-type-filter" class="filter-bar" style="margin-bottom: 3rem;">
                    <!-- Type filter buttons injected via JS -->
                </div>

                <div id="media-container" class="grid-container">
                    <!-- Media injected here -->
                    <div class="loading">Lade Mediathek...</div>
                </div>
                <div id="media-load-more" style="text-align: center; margin-top: 3rem;"></div>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container footer-content">
            <div class="footer-info">
                <h3>Kontakt</h3>
                <div id="footer-contact-container">
                    <!-- Contact info injected via CSV -->
                </div>
            </div>
            <div class="footer-legal">
                <p id="footer-copyright-line">&copy; <span id="current-year"></span> <span id="footer-club-name">Schach Rheinfelden</span>.</p>
                <p><a href="#" onclick="openLegalModal('impressum'); return false;">Impressum</a> | <a href="#" onclick="openLegalModal('datenschutz'); return false;">Datenschutz</a><span id="footer-bank-sep" style="display: none;"> | <a href="#" onclick="openLegalModal('bankverbindung'); return false;">Bankverbindung</a></span></p>
            </div>
        </div>
    </footer>

    <!-- Legal Modal -->
    <div id="legal-modal" class="modal hidden">
        <div class="modal-overlay" onclick="closeLegalModal()"></div>
        <div class="modal-content glass-card" style="max-width: 600px;">
            <button class="close-btn" onclick="closeLegalModal()">&times;</button>
            <h2 id="legal-modal-title" style="margin-bottom: 1.5rem; color: var(--accent-color);"></h2>
            <div id="legal-modal-body" style="font-size: 1.1rem; line-height: 1.6; color: var(--text-primary);"></div>
        </div>
    </div>

    <!-- YouTube/Vimeo Embed Modal (Optional) -->
    <div id="video-modal" class="modal hidden">
        <div class="modal-overlay" onclick="closeVideoModal()"></div>
        <div class="modal-content glass-card" style="max-width: 900px; padding: 1rem;">
            <button class="close-btn" onclick="closeVideoModal()">&times;</button>
            <div id="video-modal-body" style="width: 100%; height: 500px; margin-top: 2rem;"></div>
        </div>
    </div>

    <script src="js/shared.js?v=36"></script>
    <script src="js/mediathek.js?v=26"></script>
    <script>
        function closeVideoModal() {
            document.getElementById('video-modal').classList.add('hidden');
            document.getElementById('video-modal-body').innerHTML = ''; // Stop video
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
